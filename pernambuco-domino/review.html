<style>
  :root {
    --felt-deep: #0f3d1e; --felt-mid: #1a5c2e; --felt-dark: #0a2a14;
    --cream: #f4f1ea; --cream-deep: #ede6d3; --cream-shadow: #d4cfb6;
    --brass: #e9c349; --brass-light: #ffe088; --brass-dark: #cba72f;
    --text-dark: #2a221b; --text-muted: #cac99f;
    --green-ok: #22c55e; --red-no: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(ellipse at center, var(--felt-mid) 0%, var(--felt-deep) 55%, var(--felt-dark) 100%);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1, h2, .headline { font-family: 'Prata', Georgia, serif; letter-spacing: 0.5px; }
  .card {
    background: var(--cream);
    color: var(--text-dark);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    padding: 20px;
    width: 100%;
    max-width: 640px;
  }
  .muted { color: #6b6255; }
  .top-bar {
    width: 100%; max-width: 640px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .progress-track {
    flex: 1; height: 8px; background: rgba(255,255,255,0.15);
    border-radius: 4px; margin: 0 12px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--brass); transition: width 0.25s ease; }
  .stage-badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 999px; font-weight: 700;
  }
  .stage-early { background: #dbeafe; color: #1e40af; }
  .stage-mid   { background: #fef3c7; color: #92400e; }
  .stage-late  { background: #fee2e2; color: #991b1b; }

  .board-row { display: flex; justify-content: center; gap: 18px; align-items: center; margin: 14px 0; }
  .end-tile {
    width: 56px; height: 56px; border-radius: 10px;
    background: linear-gradient(180deg, #fff 0%, #f0ece2 100%);
    border: 2px solid var(--brass-dark);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 3px 6px rgba(0,0,0,0.25);
  }
  .end-label { position: absolute; top: -22px; font-size: 11px; font-weight: 700; color: var(--cream); text-transform: uppercase; letter-spacing: 1px; }
  .board-arrow { font-size: 22px; color: var(--text-muted); }

  .info-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; font-size: 12px; color: #6b6255; margin: 6px 0 14px; }
  .info-pill { background: var(--cream-deep); border: 1px solid var(--cream-shadow); border-radius: 999px; padding: 3px 10px; }

  /* Seat colors: self=brass, lho=blue, partner=green (teammate), rho=red */
  .seat-self    { color: #a6841d; }
  .seat-lho     { color: #1d4ed8; }
  .seat-partner { color: #15803d; }
  .seat-rho     { color: #b91c1c; }

  .board-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6b6255; margin: 10px 0 6px; text-align: center; }

  .replay-caption { text-align: center; font-size: 12px; color: #6b6255; margin-bottom: 6px; min-height: 16px; }
  .replay-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
  .replay-btn {
    padding: 8px 14px; border-radius: 8px; border: 2px solid var(--brass-dark);
    background: linear-gradient(180deg, #fff 0%, #f0ece2 100%); color: var(--text-dark);
    font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .replay-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .replay-btn-end { background: var(--brass); border-color: var(--brass-dark); }
  .replay-step-label { font-size: 12px; font-weight: 700; min-width: 76px; text-align: center; color: #6b6255; }

  .cant-have-box {
    background: var(--cream-deep); border: 1px solid var(--cream-shadow);
    border-radius: 10px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px;
  }
  .cant-have-title { font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; color: #6b6255; margin-bottom: 4px; }
  .cant-have-row { margin: 2px 0; }

  .hand-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6b6255; margin: 8px 0 8px; text-align: center; }
  .hand-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 8px; }

  .domino {
    width: 46px; height: 92px;
    background: linear-gradient(180deg, #fff 0%, #f5f1e8 100%);
    border: 2px solid #d8d2c2;
    border-radius: 8px;
    display: flex; flex-direction: column;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    position: relative;
  }
  .domino.legal:hover { transform: translateY(-4px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); border-color: var(--brass-dark); }
  .domino.illegal { opacity: 0.35; cursor: not-allowed; }
  .domino.chosen { border-color: var(--green-ok); border-width: 3px; transform: translateY(-4px); }
  .domino-half { flex: 1; position: relative; }
  .domino-divider { height: 2px; background: #d8d2c2; margin: 0 6px; }
  .dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: #2a221b; transform: translate(-50%, -50%); }

  .side-prompt { text-align: center; margin: 10px 0; }
  .side-btn {
    display: inline-block; margin: 6px; padding: 12px 22px;
    background: var(--brass); border: none; border-radius: 8px;
    font-family: 'Prata', Georgia, serif; font-weight: 700; font-size: 15px;
    cursor: pointer; color: var(--text-dark);
  }
  .side-btn:hover { background: var(--brass-light); }

  .reveal-box { margin-top: 16px; border-top: 2px dashed var(--cream-shadow); padding-top: 14px; }
  .reveal-verdict { text-align: center; font-weight: 700; font-size: 17px; margin-bottom: 10px; font-family: 'Prata', Georgia, serif; }
  .reveal-match { color: #15803d; }
  .reveal-miss { color: #b91c1c; }
  .rank-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; }
  .rank-bar-track { flex: 1; height: 14px; background: var(--cream-deep); border-radius: 7px; overflow: hidden; }
  .rank-bar-fill { height: 100%; background: var(--brass-dark); }
  .rank-bar-fill.is-human { background: #15803d; }
  .rank-label { width: 90px; font-family: monospace; }
  .rank-pct { width: 46px; text-align: right; font-variant-numeric: tabular-nums; }

  .next-btn, .start-btn, .export-btn {
    display: block; margin: 18px auto 0; padding: 14px 36px;
    background: linear-gradient(180deg, var(--felt-mid), var(--felt-deep));
    color: var(--cream); border: 2px solid var(--brass-dark);
    border-radius: 10px; font-family: 'Prata', Georgia, serif; font-weight: 700;
    font-size: 16px; cursor: pointer; letter-spacing: 0.5px;
  }
  .next-btn:hover, .start-btn:hover, .export-btn:hover { filter: brightness(1.1); }

  .summary-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  .summary-table th, .summary-table td { padding: 6px 8px; border-bottom: 1px solid var(--cream-shadow); text-align: left; }
  .summary-table th { color: #6b6255; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  .tag-match { color: #15803d; font-weight: 700; }
  .tag-miss { color: #b91c1c; font-weight: 700; }

  .footer-note { color: var(--text-muted); font-size: 11px; text-align: center; margin-top: 18px; max-width: 500px; }

  .sync-status { text-align: center; font-size: 12px; margin: 8px 0; }
  .sync-status.sending { color: #92400e; }
  .sync-status.ok { color: #15803d; }
  .sync-status.error { color: #b91c1c; }
</style>
</head>

  // Reused verbatim (adapted only to accept hw/vw always explicitly, and a

  // no need to re-derive that layout math here.
  function layoutSnakeV2(board, W, H, HW, VW, gap, pads) {
    const tiles = [];
    const n = board ? board.length : 0;
    if (n <= 0) return { tiles };

    pads = (typeof pads === 'number')
      ? { top: pads, right: pads, bottom: pads, left: pads }
      : Object.assign({ top: 0, right: 0, bottom: 0, left: 0 }, pads || {});

    const usableW = Math.max(1, W - pads.left - pads.right);
    const usableH = Math.max(1, H - pads.top - pads.bottom);

    const baseWidths = board.map(t => (t && t.left === t.right) ? VW : HW);

    const rowAssign = new Array(n);
    let curRow = 0;
    let curRowW = 0;
    for (let i = 0; i < n; i++) {
      if (curRowW + baseWidths[i] > usableW && curRowW > 0) {
        curRow++;
        curRowW = 0;
      }
      rowAssign[i] = curRow;
      curRowW += baseWidths[i];
    }
    const numRows = curRow + 1;

    const isTopCorner = new Array(n).fill(false);
    const isBottomCorner = new Array(n).fill(false);
    const rowTileCount = new Array(numRows).fill(0);
    for (let r = 0; r < numRows; r++) {
      let firstIdx = -1, lastIdx = -1, count = 0;
      for (let i = 0; i < n; i++) {
        if (rowAssign[i] === r) {
          if (firstIdx === -1) firstIdx = i;
          lastIdx = i;
          count++;
        }
      }
      rowTileCount[r] = count;
      if (r < numRows - 1 && lastIdx >= 0) isTopCorner[lastIdx] = true;
      if (r > 0 && firstIdx >= 0) isBottomCorner[firstIdx] = true;
    }
    const effW = (i) => {
      const t = board[i];
      return (t && t.left === t.right) || isTopCorner[i] || isBottomCorner[i] ? VW : HW;
    };

    const ROW_GAP = 12;
    const isSingleTileRow = (r) => rowTileCount[r] === 1;

    const rowY = new Array(numRows);
    rowY[0] = 0;
    for (let r = 1; r < numRows; r++) {
      const skipGap = isSingleTileRow(r - 1) || isSingleTileRow(r);
      rowY[r] = rowY[r - 1] + HW + (skipGap ? 0 : ROW_GAP);
    }
    const chainH = rowY[numRows - 1] + HW;
    const startY = pads.top + Math.max(0, (usableH - chainH) / 2);
    for (let r = 0; r < numRows; r++) rowY[r] += startY;

    const _rowWidths = [];
    for (let r = 0; r < numRows; r++) {
      let w = 0;
      for (let i = 0; i < n; i++) if (rowAssign[i] === r) w += effW(i);
      _rowWidths[r] = w;
    }
    let _cur = 0, _minX = 0, _maxX = 0;
    for (let r = 0; r < numRows; r++) {
      const _rowEnd = (r % 2 === 0) ? (_cur + _rowWidths[r]) : (_cur - _rowWidths[r]);
      _minX = Math.min(_minX, _cur, _rowEnd);
      _maxX = Math.max(_maxX, _cur, _rowEnd);
      _cur = _rowEnd;
    }
    const _boundW = _maxX - _minX;
    const _offset = pads.left + Math.max(0, (usableW - _boundW) / 2) - _minX;
    let foldX = _offset;

    for (let r = 0; r < numRows; r++) {
      const rowIndices = [];
      for (let i = 0; i < n; i++) if (rowAssign[i] === r) rowIndices.push(i);
      const rowWidth = rowIndices.reduce((s, i) => s + effW(i), 0);
      const isReversed = r % 2 === 1;

      let x = foldX;
      const rowEndX = isReversed ? (x - rowWidth) : (x + rowWidth);

      for (let k = 0; k < rowIndices.length; k++) {
        const ti = rowIndices[k];
        const t = board[ti];
        const isDouble = t.left === t.right;
        const isTopC = isTopCorner[ti];
        const isBotC = isBottomCorner[ti];
        const renderVertical = isDouble || isTopC || isBotC;
        const tw = effW(ti);
        const tileX = isReversed ? (x - tw) : x;

        let tileY;
        if (isBotC) {
          tileY = rowY[r];
        } else if (isTopC) {
          tileY = rowY[r] + (isSingleTileRow(r) ? 0 : ROW_GAP);
        } else if (renderVertical) {
          tileY = rowY[r];
        } else {
          tileY = rowY[r] + Math.round((HW - VW) / 2);
        }
        tiles.push({
          i: ti,
          x: Math.round(tileX),
          y: tileY,
          orient: renderVertical ? 'vertical' : 'horizontal',
          flip: isReversed && !renderVertical
        });
        x = isReversed ? (x - tw) : (x + tw);
      }

      foldX = rowEndX;
    }
    return { tiles };

  }
  // Group the chronological history into one segment per tile placed (a
  // segment is zero-or-more passes followed by the play that placed the
  // next tile) so stepping "forward/back between tiles placed" can still
  // narrate any passes that happened in between.
  function buildSegments(history) {
    var segments = [];
    var current = [];
    history.forEach(function (e) {
      current.push(e);
      if (!e.is_pass) {
        segments.push(current);
        current = [];
      }
    });
    if (current.length) segments.push(current);
    return segments;
  }

  const MIN_UNIT = 20, MAX_UNIT = 26; // VW clamp: legible dots vs. not comically large on short boards.
  // 9, then 14, were both too small to read on late-game boards (14+ tiles)
  // -- the container already has overflowX:auto, so long boards scroll
  // instead of shrinking past a readable floor.

  function BoardReplay({ history }) {
    const segments = React.useMemo(() => buildSegments(history), [history]);
    const maxStep = segments.length;
    const [step, setStep] = React.useState(1);
    React.useEffect(() => { setStep(1); }, [history]);

    const boardArr = React.useMemo(() => {
      const arr = [];
      for (let s = 0; s < step && s < segments.length; s++) {
        const seg = segments[s];
        const playEntry = seg[seg.length - 1];
        if (playEntry.is_pass) continue;
        const nums = tileNumsFromStr(playEntry.tile_str);
        const a = nums[0], b = nums[1];
        if (playEntry.side === 'none' || arr.length === 0) {
          arr.push({ id: s, left: a, right: b });
        } else if (playEntry.side === 'left') {
          const L = arr[0].left;
          const other = (a === L) ? b : a;
          arr.unshift({ id: s, left: other, right: L });
        } else {
          const R = arr[arr.length - 1].right;
          const other = (a === R) ? b : a;
          arr.push({ id: s, left: R, right: other });
        }
      }
      return arr;
    }, [segments, step]);

    // Size tiles to fit the phone screen instead of asking users to scroll:
    // measure the real container width, and shrink VW/HW so the FULL final
    // board (not just the current step -- keeps tile size stable while
    // stepping through the replay) fits in one row without scrolling.
    const containerRef = React.useRef(null);
    const [measuredW, setMeasuredW] = React.useState(360);
    React.useLayoutEffect(() => {
      function measure() {
        const w = containerRef.current && containerRef.current.clientWidth;
        if (w > 0) setMeasuredW(w);
      }
      measure();
      window.addEventListener('resize', measure);
      return () => window.removeEventListener('resize', measure);
    }, []);

    const totalUnits = React.useMemo(() => {
      let units = 0;
      segments.forEach(function (seg) {
        const playEntry = seg[seg.length - 1];
        if (playEntry.is_pass) return;
        const nums = tileNumsFromStr(playEntry.tile_str);
        units += (nums[0] === nums[1]) ? 1 : 2; // double = 1 VW-unit wide, non-double = 2 (HW)
      });
      return Math.max(1, units);
    }, [segments]);

    const unitPx = React.useMemo(() => {
      const avail = Math.max(40, measuredW - 16);
      return Math.max(MIN_UNIT, Math.min(MAX_UNIT, Math.floor(avail / totalUnits)));
    }, [measuredW, totalUnits]);

    const VW = unitPx, HW = unitPx * 2;
    const H = HW + 16; // tallest single-row element (a double, HW tall) + 8px top/bottom pad
    // H must match what's actually rendered below -- layoutSnakeV2 centers
    // tiles vertically using this same H, so a mismatch pushes tiles past
    // the rendered container's edge.
    const contentW = React.useMemo(() => {
      const sum = boardArr.reduce(function (s, t) { return s + (t.left === t.right ? VW : HW); }, 0);
      return Math.max(1, sum) + 16;
    }, [boardArr, VW, HW]);
    const layout = React.useMemo(
      () => layoutSnakeV2(boardArr, contentW + 40, H, HW, VW, 1, 8),
      [boardArr, contentW, HW, VW, H]
    );

    const caption = segments[step - 1] ? segments[step - 1].map(function (e) {
      const who = REPLAY_RELABEL[e.actor_rel] || e.actor_rel;
      if (e.is_pass) return who + ' tocou';
      const sideTxt = e.side === 'left' ? ' (esquerda)' : e.side === 'right' ? ' (direita)' : '';
      return who + ' jogou ' + e.tile_str + sideTxt;
    }).join(' · ') : '';

    return (
      <div>
        <div ref={containerRef} style={{ width: '100%', overflowX: 'auto', overflowY: 'hidden', background: '#0f3d1e', borderRadius: 10, marginBottom: 8 }}>
          <div style={{ position: 'relative', width: contentW, height: H, margin: '0 auto' }}>
            {layout.tiles.map((p) => {
              const t = boardArr[p.i];
              const tw = p.orient === 'horizontal' ? HW : VW;
              const th = p.orient === 'horizontal' ? VW : HW;
              return (
                <div key={p.i} style={{ position: 'absolute', left: p.x, top: p.y, width: tw, height: th }}>
                  <ReplayBoardTile tile={t} orientation={p.orient} flipped={p.flip} hw={HW} vw={VW} />
                </div>
              );
            })}
          </div>
        </div>
        <div className="replay-caption">{caption}</div>
        <div className="replay-controls">
          <button className="replay-btn" onClick={() => setStep(function (s) { return Math.max(1, s - 1); })} disabled={step <= 1}>&#9664;</button>
          <span className="replay-step-label">Jogada {step} / {maxStep}</span>
          <button className="replay-btn" onClick={() => setStep(function (s) { return Math.min(maxStep, s + 1); })} disabled={step >= maxStep}>&#9654;</button>
          <button className="replay-btn replay-btn-end" onClick={() => setStep(maxStep)} disabled={step >= maxStep}>Ir para agora</button>
        </div>
      </div>
    );
  }

  window.renderBoardReplay = function (container, history) {
    ReactDOM.render(<BoardReplay history={history} />, container);
  };
  window.unmountBoardReplay = function (container) {
    try { ReactDOM.unmountComponentAtNode(container); } catch (e) {}
  };
</script>

<script>
(function () {
  "use strict";

  var DATA = JSON.parse(document.getElementById('position-data').textContent);
  var ITEMS = DATA.items;
  var BASE_KEY = 'domino_review_' + (DATA.meta.champion_checkpoint || 'session').replace(/[^a-z0-9]/gi, '_');
  var LAST_NAME_KEY = 'domino_review_last_name';

  // Same public Firebase config as index.html (apiKey is public by design,
  // same as the live game). Writes go to review_results/, an isolated node
  // separate from rooms/ (live game state) and telemetry/ (gameplay data) --
  // see firebase/database.rules.json.
  var _fbReady = false;
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyCbfXAy3Z_Hs_mQRNHCLk30Ext4sq3k-jA",
      authDomain: "domino-pernambuco.firebaseapp.com",
      databaseURL: "https://domino-pernambuco-default-rtdb.firebaseio.com",
      projectId: "domino-pernambuco",
      storageBucket: "domino-pernambuco.firebasestorage.app",
      messagingSenderId: "464393298578",
      appId: "1:464393298578:web:f5781c8ccc0edffed7fc4b"
    });
    _fbReady = true;
  } catch (e) { console.warn('Firebase init failed:', e); }

  var state = {
    screen: 'start',       // start | position | summary
    idx: 0,
    pendingTile: null,     // tile_idx awaiting a side choice
    reviewerName: null,
    answers: {},
    startedAt: null,
  };

  function sanitizeName(name) {
    return (name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'anonimo';
  }
  function answersKey(name) {
    return BASE_KEY + '__' + sanitizeName(name);
  }
  function loadAnswers(name) {
    try {
      var raw = localStorage.getItem(answersKey(name));
      var parsed = raw ? JSON.parse(raw) : {};
      return discardStaleAnswers(parsed);
    } catch (e) { return {}; }
  }
  // Defends against a dataset regeneration mid-session (happened once during
  // testing: the position bank was rebuilt with fresh unseeded self-play
  // while a saved localStorage answer still referenced the OLD game under
  // the same id, and the stale action_idx got silently exported as "pass").
  // A saved answer is only trustworthy if its action_idx is still a legal
  // action for that id's CURRENT position; otherwise treat it as unanswered.
  function discardStaleAnswers(answers) {
    var itemById = {};
    ITEMS.forEach(function (it) { itemById[it.id] = it; });
    var clean = {};
    Object.keys(answers).forEach(function (id) {
      var item = itemById[id];
      var ans = answers[id];
      if (!item) return; // id no longer exists in current dataset at all
      var legalIdxs = item.legal_actions.map(function (a) { return a.action_idx; });
      var stillLegal = ans.is_tie
        ? (ans.tied_action_indices || []).length >= 2 &&
          ans.tied_action_indices.every(function (a) { return legalIdxs.indexOf(a) !== -1; })
        : legalIdxs.indexOf(ans.human_action_idx) !== -1;
      if (stillLegal) clean[id] = ans;
    });
    return clean;
  }
  function saveAnswers() {
    try { localStorage.setItem(answersKey(state.reviewerName), JSON.stringify(state.answers)); } catch (e) {}
  }
  function loadLastName() {
    try { return localStorage.getItem(LAST_NAME_KEY) || ''; } catch (e) { return ''; }
  }
  function saveLastName(name) {
    try { localStorage.setItem(LAST_NAME_KEY, name); } catch (e) {}
  }

  function tileNums(tileStr) {
    var parts = tileStr.split('-');
    return [parseInt(parts[0], 10), parseInt(parts[1], 10)];
  }

  // Matches index.html's DominoDots portrait layout (the pattern hand tiles
  // use -- isHoriz is only passed for board tiles, not hand tiles).
  var DOT_PATTERNS = {
    0: [], 1: [[1,1]],
    2: [[0,2],[2,0]], 3: [[0,2],[1,1],[2,0]],
    4: [[0,0],[0,2],[2,0],[2,2]], 5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
    6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  };

  function renderDots(container, value, padPx) {
    var pad = padPx || 8;
    (DOT_PATTERNS[value] || []).forEach(function (pos) {
      var d = document.createElement('div');
      d.className = 'dot';
      d.style.top = pos[0] === 0 ? pad + 'px' : pos[0] === 1 ? '50%' : 'calc(100% - ' + pad + 'px)';
      d.style.left = pos[1] === 0 ? pad + 'px' : pos[1] === 1 ? '50%' : 'calc(100% - ' + pad + 'px)';
      container.appendChild(d);
    });
  }

  function makeDominoEl(a, b) {
    var el = document.createElement('div');
    el.className = 'domino';
    var topHalf = document.createElement('div');
    topHalf.className = 'domino-half';
    renderDots(topHalf, a);
    var divider = document.createElement('div');
    divider.className = 'domino-divider';
    var botHalf = document.createElement('div');
    botHalf.className = 'domino-half';
    renderDots(botHalf, b);
    el.appendChild(topHalf);
    el.appendChild(divider);
    el.appendChild(botHalf);
    return el;
  }

  function makeEndTile(value, label) {
    var wrap = document.createElement('div');
    wrap.style.position = 'relative';
    var lab = document.createElement('div');
    lab.className = 'end-label';
    lab.textContent = label;
    wrap.appendChild(lab);
    var tile = document.createElement('div');
    tile.className = 'end-tile';
    renderDots(tile, value);
    wrap.appendChild(tile);
    return wrap;
  }

  function relLabel(rel) {
    return { self: 'voce', lho: 'esquerda', partner: 'parceiro', rho: 'direita' }[rel] || rel;
  }

  function renderCantHave(cantHave) {
    var seats = ['lho', 'partner', 'rho'].filter(function (rel) {
      return cantHave[rel] && cantHave[rel].length;
    });
    if (!seats.length) return null;
    var box = document.createElement('div');
    box.className = 'cant-have-box';
    var title = document.createElement('div');
    title.className = 'cant-have-title';
    title.textContent = 'Pistas de quem tocou';
    box.appendChild(title);
    seats.forEach(function (rel) {
      var row = document.createElement('div');
      row.className = 'cant-have-row seat-' + rel;
      row.innerHTML = '<b>' + relLabel(rel) + '</b> nao tem: ' + cantHave[rel].join(', ');
      box.appendChild(row);
    });
    return box;
  }

  function root() { return document.getElementById('root'); }
  function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  // ---------------------------------------------------------------- START

  function renderStart() {
    var r = root(); clear(r);
    var topBar = document.createElement('div');
    var card = document.createElement('div');
    card.className = 'card';
    card.style.textAlign = 'center';

    var h1 = document.createElement('h1');
    h1.textContent = 'Revisao de Jogadas';
    h1.style.marginBottom = '4px';
    card.appendChild(h1);

    var sub = document.createElement('div');
    sub.className = 'muted';
    sub.textContent = DATA.meta.n_items + ' posicoes reais de jogos do motor de IA.';
    sub.style.marginBottom = '16px';
    card.appendChild(sub);

    var p = document.createElement('p');
    p.style.fontSize = '14px';
    p.style.lineHeight = '1.6';
    p.textContent = 'Para cada posicao: sua mao e o tabuleiro aparecem. Toque na pedra que voce jogaria. ' +
      'No final, veja quanto sua escolha coincidiu com a IA.';
    card.appendChild(p);

    var nameLabel = document.createElement('div');
    nameLabel.style.cssText = 'font-size:13px;font-weight:700;margin:14px 0 6px;color:#6b6255;';
    nameLabel.textContent = 'Seu nome';
    card.appendChild(nameLabel);

    var nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.placeholder = 'Digite seu nome';
    nameInput.value = loadLastName();
    nameInput.autocomplete = 'off';
    nameInput.style.cssText = 'width:100%;max-width:280px;padding:11px 14px;border-radius:8px;' +
      'border:2px solid var(--cream-shadow);font-size:16px;text-align:center;font-family:Inter,sans-serif;';
    card.appendChild(nameInput);

    var resumeNote = document.createElement('div');
    resumeNote.className = 'footer-note';
    card.appendChild(resumeNote);

    var resetBtn = document.createElement('button');
    resetBtn.className = 'export-btn';
    resetBtn.style.cssText = 'background:transparent;color:var(--cream);border:1px solid var(--text-muted);display:none;';
    resetBtn.textContent = 'Apagar respostas salvas';
    resetBtn.onclick = function () {
      var name = nameInput.value.trim() || 'Anonimo';
      if (confirm('Apagar as respostas salvas de "' + name + '"?')) {
        try { localStorage.removeItem(answersKey(name)); } catch (e) {}
        updateResumeNote();
      }
    };
    card.appendChild(resetBtn);

    function updateResumeNote() {
      var name = nameInput.value.trim() || 'Anonimo';
      var existing = loadAnswers(name);
      var n = Object.keys(existing).length;
      var isComplete = n > 0 && n >= ITEMS.length;
      if (isComplete) {
        // Bug fix (2026-07-11): reusing a name that already finished the
        // whole set used to silently drop straight into item 1 with every
        // answer pre-filled -- the AI-ranking reveal showed immediately on
        // every position because it was already "answered" from the prior
        // session, before any fresh tap this time. Make the completed state
        // explicit instead of quietly replaying old answers as if they were
        // new choices.
        resumeNote.textContent = 'Voce ja respondeu todas as ' + ITEMS.length +
          ' posicoes como "' + name + '". "Comecar" mostra o resumo dessas ' +
          'respostas. Para refazer do zero, apague as respostas salvas abaixo primeiro.';
      } else {
        resumeNote.textContent = n > 0
          ? (n + ' de ' + ITEMS.length + ' resposta(s) salva(s) para "' + name + '". "Comecar" continua de onde parou.')
          : '';
      }
      resetBtn.style.display = n > 0 ? 'block' : 'none';
      startBtn.textContent = isComplete ? 'Ver resumo' : 'Comecar';
    }
    nameInput.addEventListener('input', updateResumeNote);

    var startBtn = document.createElement('button');
    startBtn.className = 'start-btn';
    startBtn.textContent = 'Comecar';
    startBtn.onclick = function () {
      var name = nameInput.value.trim() || 'Anonimo';
      state.reviewerName = name;
      saveLastName(name);
      state.answers = loadAnswers(name);
      state.startedAt = Date.now();
      var n = Object.keys(state.answers).length;
      if (n > 0 && n >= ITEMS.length) {
        state.screen = 'summary';
      } else {
        state.screen = 'position';
        state.idx = firstUnanswered();
      }
      render();
    };
    updateResumeNote();
    card.insertBefore(startBtn, resumeNote);

    r.appendChild(topBar);
    r.appendChild(card);
  }

  function firstUnanswered() {
    for (var i = 0; i < ITEMS.length; i++) {
      if (!state.answers[ITEMS[i].id]) return i;
    }
    return 0;
  }

  // ------------------------------------------------------------- POSITION

  function renderTopBar(currentIdx) {
    var bar = document.createElement('div');
    bar.className = 'top-bar';

    var count = document.createElement('div');
    count.style.fontSize = '13px';
    count.style.fontWeight = '700';
    count.textContent = (currentIdx + 1) + ' / ' + ITEMS.length;
    if (state.reviewerName) {
      var nameTag = document.createElement('span');
      nameTag.style.cssText = 'font-weight:400;color:var(--text-muted);margin-left:8px;';
      nameTag.textContent = '(' + state.reviewerName + ')';
      count.appendChild(nameTag);
    }
    bar.appendChild(count);

    var track = document.createElement('div');
    track.className = 'progress-track';
    var fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.style.width = (100 * (currentIdx) / ITEMS.length) + '%';
    track.appendChild(fill);
    bar.appendChild(track);

    var stage = ITEMS[currentIdx].stage;
    var badge = document.createElement('div');
    badge.className = 'stage-badge stage-' + stage;
    badge.textContent = stage === 'early' ? 'abertura' : stage === 'mid' ? 'meio' : 'final';
    bar.appendChild(badge);

    return bar;
  }

  function actionLabel(action) {
    if (action.side === 'pass') return 'passar';
    return action.tile_str + (action.side === 'left' ? ' (esq)' : ' (dir)');
  }

  function renderPosition() {
    var item = ITEMS[state.idx];
    var r = root(); clear(r);
    r.appendChild(renderTopBar(state.idx));

    var card = document.createElement('div');
    card.className = 'card';

    // Board ends
    var boardRow = document.createElement('div');
    boardRow.className = 'board-row';
    boardRow.appendChild(makeEndTile(item.public_state.left_end, 'esquerda'));
    var arrow = document.createElement('div');
    arrow.className = 'board-arrow';
    arrow.textContent = '—'.repeat(3) + ' ' + item.public_state.board_length + ' pedras ' + '—'.repeat(3);
    arrow.style.fontSize = '11px';
    boardRow.appendChild(arrow);
    boardRow.appendChild(makeEndTile(item.public_state.right_end, 'direita'));
    card.appendChild(boardRow);

    // Hand sizes
    var handSizeLabel = document.createElement('div');
    handSizeLabel.className = 'board-label';
    handSizeLabel.textContent = 'Pedras na mao de cada jogador';
    card.appendChild(handSizeLabel);

    var infoRow = document.createElement('div');
    infoRow.className = 'info-row';
    var hs = item.public_state.hand_sizes;
    var pluralize = function (n) { return n === 1 ? 'pedra' : 'pedras'; };
    var labels = [
      'voce: ' + hs[0] + ' ' + pluralize(hs[0]),
      'esquerda: ' + hs[1] + ' ' + pluralize(hs[1]),
      'parceiro: ' + hs[2] + ' ' + pluralize(hs[2]),
      'direita: ' + hs[3] + ' ' + pluralize(hs[3]),
    ];
    labels.forEach(function (t) {
      var pill = document.createElement('div');
      pill.className = 'info-pill';
      pill.textContent = t;
      infoRow.appendChild(pill);
    });
    card.appendChild(infoRow);

    // Full board replay: reuses the real game's own layoutSnakeV2 + BoardTile
    // rendering (mounted via React) so tiles actually connect the way they
    // do on the felt, with step-through controls to walk the history.
    var history = item.public_state.history;
    if (history && history.length) {
      var boardLabel = document.createElement('div');
      boardLabel.className = 'board-label';
      boardLabel.textContent = 'Tabuleiro completo';
      card.appendChild(boardLabel);
      var replayMount = document.createElement('div');
      card.appendChild(replayMount);
      window.renderBoardReplay(replayMount, history);
      lastReplayContainer = replayMount;
    }

    // Clues from passes: which pips each opponent is known NOT to hold.
    if (item.public_state.cant_have) {
      var cantHaveEl = renderCantHave(item.public_state.cant_have);
      if (cantHaveEl) card.appendChild(cantHaveEl);
    }

    // Hand
    var handLabel = document.createElement('div');
    handLabel.className = 'hand-label';
    handLabel.textContent = 'Sua mao — toque na pedra que voce jogaria';
    card.appendChild(handLabel);

    var handRow = document.createElement('div');
    handRow.className = 'hand-row';

    var legalByTile = {}; // tile_idx -> [action, ...]
    item.legal_actions.forEach(function (a) {
      if (a.side === 'pass') return;
      (legalByTile[a.tile_idx] = legalByTile[a.tile_idx] || []).push(a);
    });

    // Once this item has a recorded answer (this session or a prior one),
    // the hand locks: no onclick handlers, so a second tap can never silently
    // overwrite the recorded choice. The chosen tile gets the (previously
    // unused) .chosen highlight so it's visually obvious what was picked.
    var existing = state.answers[item.id];
    var chosenAction = existing ? findAction(item, existing.human_action_idx) : null;
    var chosenTileIdx = chosenAction ? chosenAction.tile_idx : null;

    item.public_state.my_hand_indices.forEach(function (tileIdx, i) {
      var nums = tileNums(item.public_state.my_hand_tiles[i]);
      var el = makeDominoEl(nums[0], nums[1]);
      var actions = legalByTile[tileIdx];
      var isLegal = !!actions;
      el.className += isLegal ? ' legal' : ' illegal';
      if (existing) {
        if (tileIdx === chosenTileIdx) el.className += ' chosen';
      } else if (isLegal) {
        el.onclick = function () { onTileClick(tileIdx, actions); };
      }
      handRow.appendChild(el);
    });
    card.appendChild(handRow);

    var canPass = item.legal_actions.some(function (a) { return a.side === 'pass'; });
    if (canPass && !existing) {
      var passBtn = document.createElement('button');
      passBtn.className = 'side-btn';
      passBtn.style.display = 'block';
      passBtn.style.margin = '10px auto 0';
      passBtn.textContent = 'Passar (nao ha jogada)';
      passBtn.onclick = function () { recordAnswer(56); };
      card.appendChild(passBtn);
    } else if (canPass && existing && existing.human_action_idx === 56) {
      var passedNote = document.createElement('div');
      passedNote.className = 'side-btn';
      passedNote.style.cssText = 'display:block;margin:10px auto 0;opacity:0.6;cursor:default;';
      passedNote.textContent = 'Voce tocou';
      card.appendChild(passedNote);
    }

    // Davidson-Luce tie extension (AUDIT_PROMPT_v39 round): forcing a pick
    // between two moves the reviewer genuinely sees as equal injects noise
    // into the preference model. Offered whenever there's a real choice to
    // be indifferent about (>=2 legal actions).
    if (item.legal_actions.length >= 2 && !existing) {
      var tieBtn = document.createElement('button');
      tieBtn.className = 'side-btn';
      tieBtn.style.cssText = 'display:block;margin:8px auto 0;opacity:0.75;';
      tieBtn.textContent = 'Empate / Indiferente';
      tieBtn.onclick = function () { recordTie(); };
      card.appendChild(tieBtn);
    } else if (existing && existing.is_tie) {
      var tieNote = document.createElement('div');
      tieNote.className = 'side-btn';
      tieNote.style.cssText = 'display:block;margin:8px auto 0;opacity:0.6;cursor:default;';
      tieNote.textContent = 'Voce marcou empate';
      card.appendChild(tieNote);
    }

    var sidePromptHolder = document.createElement('div');
    sidePromptHolder.id = 'side-prompt-holder';
    card.appendChild(sidePromptHolder);

    if (existing) {
      card.appendChild(renderReveal(item, existing));
    }

    r.appendChild(card);

    var footer = document.createElement('div');
    footer.className = 'footer-note';
    footer.textContent = 'Suas respostas ficam salvas neste navegador. Nada e enviado ao jogo ao vivo.';
    r.appendChild(footer);
  }

  function onTileClick(tileIdx, actions) {
    if (actions.length === 1) {
      recordAnswer(actions[0].action_idx);
      return;
    }
    // Two sides playable: prompt.
    var holder = document.getElementById('side-prompt-holder');
    clear(holder);
    var prompt = document.createElement('div');
    prompt.className = 'side-prompt';
    var q = document.createElement('div');
    q.style.fontSize = '13px';
    q.style.marginBottom = '4px';
    q.textContent = 'Jogar em qual lado?';
    prompt.appendChild(q);
    actions.forEach(function (a) {
      var btn = document.createElement('button');
      btn.className = 'side-btn';
      btn.textContent = a.side === 'left' ? 'Esquerda' : 'Direita';
      btn.onclick = function () { recordAnswer(a.action_idx); };
      prompt.appendChild(btn);
    });
    holder.appendChild(prompt);
  }

  function recordAnswer(actionIdx) {
    var item = ITEMS[state.idx];
    var elapsed = state.startedAt ? (Date.now() - state.startedAt) : null;
    state.answers[item.id] = {
      human_action_idx: actionIdx,
      elapsed_ms: elapsed,
      answered_at: new Date().toISOString(),
    };
    state.startedAt = Date.now();
    saveAnswers();
    render();
  }

  function recordTie() {
    // Davidson-Luce tie extension (AUDIT_PROMPT_v39 round): "all the legal
    // moves shown are equally good to me," rather than forcing a pick among
    // options the reviewer doesn't actually have a preference between.
    var item = ITEMS[state.idx];
    var elapsed = state.startedAt ? (Date.now() - state.startedAt) : null;
    state.answers[item.id] = {
      is_tie: true,
      tied_action_indices: item.legal_actions.map(function (a) { return a.action_idx; }),
      elapsed_ms: elapsed,
      answered_at: new Date().toISOString(),
    };
    state.startedAt = Date.now();
    saveAnswers();
    render();
  }

  function findAction(item, actionIdx) {
    for (var i = 0; i < item.legal_actions.length; i++) {
      if (item.legal_actions[i].action_idx === actionIdx) return item.legal_actions[i];
    }
    return null;
  }

  function renderReveal(item, answer) {
    var box = document.createElement('div');
    box.className = 'reveal-box';

    var eng = item.engine_suggestions[Object.keys(item.engine_suggestions)[0]];
    var isTieAnswer = !!answer.is_tie;
    var tiedSet = isTieAnswer ? answer.tied_action_indices : [answer.human_action_idx];

    var humanLabel;
    if (isTieAnswer) {
      humanLabel = tiedSet.map(function (idx) {
        var a = findAction(item, idx);
        return a ? actionLabel(a) : '?';
      }).join(' ou ');
    } else {
      var humanAction = findAction(item, answer.human_action_idx);
      humanLabel = humanAction ? actionLabel(humanAction) : 'passar';
    }

    var rankIdx = eng.top_actions.findIndex(function (a) { return tiedSet.indexOf(a.action_idx) !== -1; });
    var isTop1 = rankIdx === 0;

    var verdict = document.createElement('div');
    verdict.className = 'reveal-verdict ' + (isTop1 ? 'reveal-match' : 'reveal-miss');
    if (isTieAnswer) {
      verdict.textContent = isTop1 ? 'IA concorda que e proximo (top 1 esta no seu empate)'
        : (rankIdx >= 0 ? 'IA prefere outra opcao (rank #' + (rankIdx + 1) + ' esta no seu empate)'
                        : 'IA prefere algo fora do seu empate');
    } else {
      verdict.textContent = isTop1 ? 'Igual a IA!' : (rankIdx >= 0 ? 'Diferente (rank #' + (rankIdx + 1) + ' na IA)' : 'Diferente (fora do top 4 da IA)');
    }
    box.appendChild(verdict);

    var youLine = document.createElement('div');
    youLine.style.textAlign = 'center';
    youLine.style.fontSize = '13px';
    youLine.style.marginBottom = '10px';
    youLine.innerHTML = 'Voce jogou: <b>' + humanLabel + '</b>';
    box.appendChild(youLine);

    eng.top_actions.forEach(function (a, i) {
      var row = document.createElement('div');
      row.className = 'rank-row';
      var isHuman = tiedSet.indexOf(a.action_idx) !== -1;
      var label = document.createElement('div');
      label.className = 'rank-label';
      label.textContent = actionLabel(a);
      row.appendChild(label);
      var track = document.createElement('div');
      track.className = 'rank-bar-track';
      var fill = document.createElement('div');
      fill.className = 'rank-bar-fill' + (isHuman ? ' is-human' : '');
      fill.style.width = Math.max(2, eng.top_probs[i] * 100) + '%';
      track.appendChild(fill);
      row.appendChild(track);
      var pct = document.createElement('div');
      pct.className = 'rank-pct';
      pct.textContent = (eng.top_probs[i] * 100).toFixed(0) + '%';
      row.appendChild(pct);
      box.appendChild(row);
    });

    var nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.textContent = (state.idx + 1 < ITEMS.length) ? 'Proxima posicao' : 'Ver resumo';
    nextBtn.onclick = goToNext;
    box.appendChild(nextBtn);

    var autoNote = document.createElement('div');
    autoNote.className = 'footer-note';
    autoNote.style.marginTop = '4px';
    autoNote.textContent = 'Avancando automaticamente...';
    box.appendChild(autoNote);

    // Auto-advance so answering is a single tap, not tap-then-tap-next --
    // the button above still works immediately for anyone who doesn't want
    // to wait. clearPendingAdvance() at the top of every render() cancels
    // this if the user navigates away some other way first.
    pendingAdvanceTimer = setTimeout(goToNext, AUTO_ADVANCE_MS);

    return box;
  }

  // -------------------------------------------------------------- SUMMARY

  function renderSummary() {
    var r = root(); clear(r);
    var card = document.createElement('div');
    card.className = 'card';

    var h2 = document.createElement('h2');
    h2.textContent = 'Resumo da Sessao';
    h2.style.textAlign = 'center';
    h2.style.marginBottom = '2px';
    card.appendChild(h2);

    if (state.reviewerName) {
      var nameSub = document.createElement('div');
      nameSub.className = 'muted';
      nameSub.style.textAlign = 'center';
      nameSub.textContent = state.reviewerName;
      card.appendChild(nameSub);
    }

    var rows = ITEMS.map(function (item) {
      var ans = state.answers[item.id];
      if (!ans) return null;
      var eng = item.engine_suggestions[Object.keys(item.engine_suggestions)[0]];
      var tiedSet = ans.is_tie ? ans.tied_action_indices : [ans.human_action_idx];
      var rankIdx = eng.top_actions.findIndex(function (a) { return tiedSet.indexOf(a.action_idx) !== -1; });
      var humanLabel;
      if (ans.is_tie) {
        humanLabel = 'empate (' + tiedSet.length + ')';
      } else {
        var humanAction = findAction(item, ans.human_action_idx);
        humanLabel = humanAction ? actionLabel(humanAction) : 'passar';
      }
      return {
        id: item.id,
        stage: item.stage,
        human: humanLabel,
        model: actionLabel(eng.top_actions[0]) + ' (' + (eng.top_probs[0] * 100).toFixed(0) + '%)',
        match: rankIdx === 0,
      };
    }).filter(Boolean);

    var matches = rows.filter(function (x) { return x.match; }).length;
    var pct = rows.length ? Math.round(100 * matches / rows.length) : 0;

    var stat = document.createElement('div');
    stat.style.textAlign = 'center';
    stat.style.margin = '10px 0 16px';
    stat.innerHTML = '<div style="font-size:36px;font-weight:700;font-family:Prata,Georgia,serif">' + pct + '%</div>' +
      '<div class="muted">concordancia com o top-1 da IA (' + matches + '/' + rows.length + ')</div>';
    card.appendChild(stat);

    var table = document.createElement('table');
    table.className = 'summary-table';
    var thead = document.createElement('tr');
    ['#', 'Fase', 'Voce', 'IA', ''].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      thead.appendChild(th);
    });
    table.appendChild(thead);
    rows.forEach(function (row, i) {
      var tr = document.createElement('tr');
      var cells = [i + 1, row.stage, row.human, row.model];
      cells.forEach(function (c) {
        var td = document.createElement('td');
        td.textContent = c;
        tr.appendChild(td);
      });
      var tagTd = document.createElement('td');
      tagTd.className = row.match ? 'tag-match' : 'tag-miss';
      tagTd.textContent = row.match ? 'igual' : 'diferente';
      tr.appendChild(tagTd);
      table.appendChild(tr);
    });
    card.appendChild(table);

    var syncStatus = document.createElement('div');
    syncStatus.className = 'sync-status';
    card.appendChild(syncStatus);
    autoSubmitToFirebase(syncStatus);

    var exportBtn = document.createElement('button');
    exportBtn.className = 'export-btn';
    exportBtn.textContent = 'Baixar resultados (JSON)';
    exportBtn.onclick = exportResults;
    card.appendChild(exportBtn);

    var backBtn = document.createElement('button');
    backBtn.className = 'export-btn';
    backBtn.style.background = 'transparent';
    backBtn.style.color = 'var(--cream)';
    backBtn.style.border = '1px solid var(--text-muted)';
    backBtn.textContent = 'Revisar posicoes novamente';
    backBtn.onclick = function () { state.screen = 'start'; render(); };
    card.appendChild(backBtn);

    r.appendChild(card);
  }

  var _autoSubmitAttempted = false;
  function autoSubmitToFirebase(statusEl) {
    if (_autoSubmitAttempted) return;
    _autoSubmitAttempted = true;
    if (!_fbReady) {
      statusEl.className = 'sync-status error';
      statusEl.textContent = 'Nao foi possivel conectar -- use "Baixar resultados" abaixo.';
      return;
    }
    statusEl.className = 'sync-status sending';
    statusEl.textContent = 'Enviando resultados...';
    var payload = buildExportPayload();
    var entryId = sanitizeName(state.reviewerName) + '_' + Date.now();
    firebase.database().ref('review_results/' + entryId).set(payload).then(function () {
      statusEl.className = 'sync-status ok';
      statusEl.textContent = 'Resultados enviados automaticamente.';
    }).catch(function (err) {
      console.warn('Auto-submit failed:', err);
      statusEl.className = 'sync-status error';
      statusEl.textContent = 'Envio automatico falhou -- use "Baixar resultados" abaixo.';
    });
  }

  function buildExportPayload() {
    return {
      exported_at: new Date().toISOString(),
      reviewer_name: state.reviewerName,
      champion_checkpoint: DATA.meta.champion_checkpoint,
      items: ITEMS.map(function (item) {
        var ans = state.answers[item.id];
        if (!ans) return null;
        var label;
        if (ans.is_tie) {
          // Davidson-Luce tie extension (AUDIT_PROMPT_v39 round) -- no single
          // preferred action, review_data.tied_action_indices() reads this.
          label = {
            is_tie: true,
            tied_action_indices: ans.tied_action_indices,
            elapsed_ms: ans.elapsed_ms,
            answered_at: ans.answered_at,
          };
        } else {
          var action = findAction(item, ans.human_action_idx);
          // action should always resolve -- discardStaleAnswers() already drops
          // any saved answer whose action_idx isn't legal for this item. If it
          // ever doesn't (shouldn't happen), say so plainly instead of the old
          // bug where this silently defaulted to "pass".
          label = {
            preferred_actions: [action ? (action.side === 'pass' ? 'pass' : action.tile_str + '_' + action.side) : 'STALE_UNRESOLVED'],
            preferred_tiles: action && action.side !== 'pass' ? [action.tile_str] : [],
            human_action_idx: ans.human_action_idx,
            elapsed_ms: ans.elapsed_ms,
            answered_at: ans.answered_at,
          };
        }
        return Object.assign({}, item, { label: label });
      }).filter(Boolean),
    };
  }

  function exportResults() {
    var out = buildExportPayload();
    var blob = new Blob([JSON.stringify(out, null, 1)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'domino_review_' + sanitizeName(state.reviewerName) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var AUTO_ADVANCE_MS = 2500; // time to glance at the AI-comparison reveal before auto-advancing
  var lastReplayContainer = null;
  var pendingAdvanceTimer = null;
  function clearPendingAdvance() {
    if (pendingAdvanceTimer) { clearTimeout(pendingAdvanceTimer); pendingAdvanceTimer = null; }
  }
  function goToNext() {
    clearPendingAdvance();
    if (state.idx + 1 < ITEMS.length) {
      state.idx += 1;
    } else {
      state.screen = 'summary';
    }
    render();
  }

  function render() {
    clearPendingAdvance();
    if (lastReplayContainer) {
      try { window.unmountBoardReplay(lastReplayContainer); } catch (e) {}
      lastReplayContainer = null;
    }
    if (state.screen === 'start') renderStart();
    else if (state.screen === 'position') {
      if (state.idx >= ITEMS.length) { state.screen = 'summary'; render(); return; }
      renderPosition();
    } else renderSummary();
  }

  render();
})();
</script>
</body>
</html>
